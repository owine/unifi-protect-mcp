name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --prod --audit-level=high
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run build

  test-matrix:
    needs: lint
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        node-version:
          - '22.23.1' # renovate: datasource=node-version depName=node-lts-22 packageName=node
          - '24.18.0' # renovate: datasource=node-version depName=node-lts-24 packageName=node
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm test

  # Aggregator with a stable name so branch rulesets can require a single `test`
  # check regardless of how the matrix dimensions change.
  test:
    needs: test-matrix
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Verify matrix succeeded
        env:
          MATRIX_RESULT: ${{ needs.test-matrix.result }}
        run: |
          if [ "$MATRIX_RESULT" != "success" ]; then
            echo "test-matrix did not succeed: $MATRIX_RESULT"
            exit 1
          fi

  security:
    # Skip on Renovate runs — Renovate runs its own vulnerability checks
    if: github.actor != 'renovate[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
